<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0b1512" />
  <title>Gaming Boys Futsal — RSVP</title>
  <link rel="icon" type="image/png" href="assets/gb-logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- ============ BOOT LOADER ============ -->
  <div id="boot" class="boot">
    <img class="boot-ball" src="assets/gb-logo.png" alt="Gaming Boys" />
  </div>

  <!-- ============ AUTH SCREEN ============ -->
  <section id="auth-screen" class="screen auth-screen hidden">
    <div class="auth-bg-glow"></div>
    <div class="auth-card" id="auth-card">
      <div class="auth-logo">
        <img class="auth-ball" src="assets/gb-logo.png" alt="Gaming Boys logo" />
      </div>
      <h1 class="auth-title">Gaming Boys Futsal</h1>
      <p class="auth-sub" id="auth-sub">Enter your name and PIN to jump in</p>

      <form id="auth-form" autocomplete="off">
        <div class="field">
          <input type="text" id="auth-name" placeholder=" " maxlength="30" required
                 autocapitalize="words" spellcheck="false" />
          <label for="auth-name">Your name</label>
        </div>

        <div class="pin-group" id="pin-group" aria-label="4 digit PIN">
          <input type="password" inputmode="numeric" pattern="[0-9]" maxlength="1" class="pin-box" />
          <input type="password" inputmode="numeric" pattern="[0-9]" maxlength="1" class="pin-box" />
          <input type="password" inputmode="numeric" pattern="[0-9]" maxlength="1" class="pin-box" />
          <input type="password" inputmode="numeric" pattern="[0-9]" maxlength="1" class="pin-box" />
        </div>

        <button type="submit" id="auth-btn" class="btn btn-primary btn-auth">
          <span class="btn-label" id="auth-btn-label">Let's play</span>
          <span class="btn-spinner"></span>
        </button>
      </form>

      <p class="auth-error" id="auth-error"></p>
    </div>
  </section>

  <!-- ============ MAIN APP ============ -->
  <section id="app-screen" class="screen app-screen hidden">
    <header class="topbar">
      <div class="topbar-brand">
        <img class="topbar-ball" src="assets/gb-logo.png" alt="Gaming Boys logo" />
        <span class="topbar-title">Gaming Boys</span>
      </div>
      <nav class="tabs" id="tabs">
        <button class="tab active" data-tab="feed">Sessions</button>
        <button class="tab admin-only hidden" data-tab="admin">Admin</button>
        <span class="tab-ink" id="tab-ink"></span>
      </nav>
      <div class="topbar-user">
        <span class="user-chip" id="user-chip"></span>
        <button class="btn-icon" id="logout-btn" title="Log out">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </header>

    <!-- Feed view -->
    <main id="view-feed" class="view">
      <div id="feed" class="feed"></div>
      <div id="feed-empty" class="empty hidden">
        <div class="empty-ball">🥅</div>
        <h3>No upcoming sessions</h3>
        <p id="empty-hint">Check back soon — the next game will show up here.</p>
      </div>
    </main>

    <!-- Admin view -->
    <main id="view-admin" class="view hidden">
      <div class="admin-card">
        <h2>Create a session</h2>
        <p class="admin-sub">Set up the next game. It appears instantly for everyone.</p>
        <form id="create-form">
          <div class="field">
            <input type="text" id="s-location" placeholder=" " required maxlength="60" />
            <label for="s-location">Location</label>
          </div>
          <div class="field">
            <input type="datetime-local" id="s-time" required />
            <label class="label-fixed" for="s-time">Kick-off time</label>
          </div>
          <div class="field">
            <input type="number" id="s-max" placeholder=" " min="2" max="99" value="10" required />
            <label for="s-max">Max players</label>
          </div>
          <button type="submit" class="btn btn-primary" id="create-btn">
            <span class="btn-label">Create session</span>
            <span class="btn-spinner"></span>
          </button>
        </form>
      </div>
    </main>
  </section>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <template id="card-template">
    <article class="card">
      <div class="card-head">
        <div>
          <h3 class="card-location"></h3>
          <p class="card-time"></p>
        </div>
        <div class="card-head-right">
          <span class="card-countdown"></span>
          <button class="btn-icon btn-delete admin-only hidden" title="Delete session">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
          </button>
        </div>
      </div>

      <div class="capacity">
        <div class="capacity-bar"><div class="capacity-fill"></div></div>
        <span class="capacity-text"></span>
      </div>

      <div class="lists">
        <div class="list list-in">
          <h4><span class="dot dot-in"></span>In <span class="list-count"></span></h4>
          <div class="chips"></div>
        </div>
        <div class="list list-out">
          <h4><span class="dot dot-out"></span>Out <span class="list-count"></span></h4>
          <div class="chips"></div>
        </div>
      </div>

      <div class="vote-row">
        <button class="btn btn-vote btn-in"><span class="btn-label">I'm in</span></button>
        <button class="btn btn-vote btn-out"><span class="btn-label">I'm out</span></button>
      </div>
      <p class="full-note hidden">Session is full</p>
    </article>
  </template>

  <script type="module" src="js/app.js"></script>
</body>
</html>
